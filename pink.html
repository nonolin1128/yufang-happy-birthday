<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>第一位隊員已加入！</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", Arial, sans-serif;
      background: linear-gradient(180deg, #ffe1f0, #dff4ff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: #3b2f2f;
    }

    .card {
      max-width: 520px;
      background: rgba(255,255,255,0.92);
      border-radius: 32px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }

    h1 {
      font-size: 34px;
      color: #ff69a6;
      margin-bottom: 16px;
    }

    p {
      font-size: 20px;
      line-height: 1.8;
      font-weight: 700;
    }

    .progress {
      display: inline-block;
      margin-top: 10px;
      margin-bottom: 18px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #ffe4f1;
      color: #ff4f98;
      font-weight: 800;
      font-size: 18px;
    }

    img {
      width: 100%;
      border-radius: 24px;
      margin-top: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }

    .download {
      display: inline-block;
      margin-top: 22px;
      padding: 14px 24px;
      background: #ff8fbd;
      color: white;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <main class="card">

    <h1>🪽 第一位隊員已加入！</h1>

    <div class="progress">
      任務進度：1 / 5 🌱
    </div>

    <p>
      恭喜隊長瑜方！🎉<br><br>

      妳成功找到了第一位隊員！<br><br>

      接下來還有其他皮克敏<br>
      散落在信義區的各個角落。<br><br>

      快去把大家都找回來吧！🌱
    </p>

    <img
      src="LINE_ALBUM_瑜方的皮克敏們_260601_6.jpg"
      alt="粉紅皮克敏"
    />

    <a
      class="download"
      href="LINE_ALBUM_瑜方的皮克敏們_260601_6.jpg"
      download
    >
      下載這張圖片
    </a>

  </main>

</body>
</html>
