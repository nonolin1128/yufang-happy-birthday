<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不要作弊啦！</title>

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:"Noto Sans TC",sans-serif;
    background:linear-gradient(
        180deg,
        #fff3a3,
        #ffd6e8,
        #dff8d8
    );
    padding:20px;
}

.card{
    background:rgba(255,255,255,.92);
    padding:40px;
    border-radius:32px;
    text-align:center;
    max-width:650px;
    box-shadow:0 15px 50px rgba(0,0,0,.15);
}

h1{
    font-size:48px;
    margin-bottom:20px;
}

.main{
    font-size:28px;
    font-weight:800;
    line-height:2;
    color:#3b2f2f;
}

.sub{
    margin-top:25px;
    font-size:20px;
    color:#666;
    line-height:1.8;
}

.back{
    display:inline-block;
    margin-top:30px;
    padding:14px 28px;
    border-radius:999px;
    background:#8bc34a;
    color:white;
    text-decoration:none;
    font-weight:800;
    box-shadow:0 6px 0 #689f38;
}

.back:active{
    transform:translateY(3px);
    box-shadow:0 3px 0 #689f38;
}

</style>
</head>

<body>

<div class="card">

    <h1>🌱🤨🌱</h1>

    <div class="main">
        不要亂改網址啦！🤣<br><br>

        我知道妳想作弊。<br><br>

        甚至還想猜其他皮克敏在哪裡。<br><br>

        但是......<br><br>

        沒有就是沒有！😤
    </div>

    <div class="sub">
        隊長瑜方請停止亂翻資料夾。<br>
        回去認真找皮克敏啦！<br><br>

        （製作人正在看著妳 👀）
    </div>

    <a class="back" href="/">
        我錯了，回去找皮克敏
    </a>

</div>

</body>
</html>
