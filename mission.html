<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>任務開始</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#dff8d8,#fff3b0,#ffd6e7);
    font-family:"Noto Sans TC",sans-serif;
    overflow:hidden;
}

.card{
    width:min(90vw,700px);
    background:rgba(255,255,255,.92);
    border-radius:32px;
    padding:40px 32px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}

h1{
    color:#5b8c3a;
    font-size:40px;
    margin-bottom:24px;
}

.content{
    font-size:24px;
    line-height:2;
    font-weight:700;
    color:#3b2f2f;
}

.highlight{
    color:#ff6b6b;
    font-size:28px;
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:16px 32px;
    border-radius:999px;
    background:#8bc34a;
    color:white;
    text-decoration:none;
    font-weight:800;
    font-size:20px;
    box-shadow:0 8px 0 #689f38;
}

.pikmin{
    position:absolute;
    font-size:40px;
    animation:float 4s infinite ease-in-out;
}

.p1{top:10%;left:10%;}
.p2{top:15%;right:10%;animation-delay:1s;}
.p3{bottom:10%;left:15%;animation-delay:2s;}
.p4{bottom:12%;right:12%;animation-delay:3s;}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}
</style>
</head>

<body>

<div class="pikmin p1">🌱</div>
<div class="pikmin p2">🟡</div>
<div class="pikmin p3">🧊</div>
<div class="pikmin p4">🪨</div>

<div class="card">

    <h1>⚠️ 任務開始 ⚠️</h1>

    <div class="content">
        嘿嘿！想不到吧！ 😏<br><br>

        <span class="highlight">今天沒有海底撈！</span><br><br>

        但是......<br><br>

        <span class="highlight">你有皮克敏可以撈！🌱</span><br><br>

        我把專屬於瑜方的皮克敏<br>
        偷偷藏在信義區的各個角落了。<br><br>

        每找到一隻皮克敏，<br>
        就掃描她身上的 QR Code。<br><br>

        準備好了嗎？<br><br>

        隊長 瑜方，<br>
        出發吧！🚀
    </div>

    <a class="button" href="#">
        我準備好了！
    </a>

</div>

</body>
</html>
