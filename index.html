<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>出發吧！瑜方！</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", Arial, sans-serif;
      background: linear-gradient(180deg, #fff6b7 0%, #ffd6e8 45%, #c8f7dc 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #3b2f2f;
    }

    .card {
      width: min(88vw, 520px);
      padding: 40px 28px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 50px rgba(120, 80, 80, 0.22);
      text-align: center;
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 18px;
      color: #ff6b6b;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 30px;
      margin: 0 0 12px;
      color: #5b8c3a;
    }

    p {
      font-size: 22px;
      margin: 0;
      line-height: 1.7;
      font-weight: 700;
    }

    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 26px;
      border-radius: 999px;
      background: #ffcc4d;
      color: #4a341f;
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 8px 0 #e8a92e;
    }

    .pikmin {
      font-size: 42px;
      margin-bottom: 16px;
      animation: bounce 1.6s infinite ease-in-out;
    }

    .confetti {
      position: absolute;
      font-size: 28px;
      animation: float 6s infinite ease-in-out;
      opacity: 0.8;
    }

    .c1 { top: 8%; left: 10%; }
    .c2 { top: 18%; right: 12%; animation-delay: 1s; }
    .c3 { bottom: 12%; left: 14%; animation-delay: 2s; }
    .c4 { bottom: 16%; right: 10%; animation-delay: 3s; }
    .c5 { top: 50%; left: 5%; animation-delay: 1.5s; }
    .c6 { top: 55%; right: 6%; animation-delay: 2.5s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-24px) rotate(12deg); }
    }
  </style>
</head>

<body>
  <div class="confetti c1">🎂</div>
  <div class="confetti c2">🎉</div>
  <div class="confetti c3">🌱</div>
  <div class="confetti c4">🎁</div>
  <div class="confetti c5">✨</div>
  <div class="confetti c6">🌼</div>

  <main class="card">
    <div class="pikmin">🌱🎈🌼</div>
    <h1>生日快樂！</h1>
    <h2>出發吧！瑜方！</h2>
    <p>尋找你的皮克敏</p>

    <a class="button" href="#">Start Adventure</a>
  </main>
</body>
</html>
